<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⭐ GitHub Stars — カテゴリ別</title>
<style>
  /* ライトテーマ（デフォルト） */
  :root {
    --bg: #ffffff;
    --bg2: #f6f8fa;
    --border: #d0d7de;
    --fg: #1f2328;
    --muted: #636c76;
    --accent: #0969da;
    --accent2: #bc4c00;
    --mark-bg: #fff8c5;
    --mark-fg: #1f2328;
    --header-bg: rgba(255,255,255,.92);
    --chip-active-fg: #ffffff;
    --radius: 10px;
  }
  /* ダークテーマ */
  :root[data-theme="dark"] {
    --bg: #0d1117;
    --bg2: #161b22;
    --border: #30363d;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent2: #f0883e;
    --mark-bg: #9e6a03;
    --mark-fg: #ffffff;
    --header-bg: rgba(13,17,23,.92);
    --chip-active-fg: #0d1117;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--header-bg);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .theme-toggle {
    cursor: pointer;
    background: var(--bg2); border: 1px solid var(--border); color: var(--fg);
    padding: 8px 12px; border-radius: var(--radius); font-size: 14px; line-height: 1;
    white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .checkbox { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; }
  .checkbox input { cursor: pointer; }
  .title { font-size: 18px; font-weight: 700; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .title small { color: var(--muted); font-weight: 400; font-size: 13px; }
  .controls { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  #search {
    flex: 1; min-width: 200px;
    background: var(--bg2); border: 1px solid var(--border); color: var(--fg);
    padding: 8px 12px; border-radius: var(--radius); font-size: 14px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--fg);
    padding: 8px 12px; border-radius: var(--radius); font-size: 14px;
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 20px 0; }
  .chip {
    cursor: pointer; user-select: none;
    background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 999px; font-size: 12px; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--fg); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--chip-active-fg); font-weight: 600; }
  main { padding: 16px 20px 60px; max-width: 1400px; margin: 0 auto; }
  .cat { margin-bottom: 28px; scroll-margin-top: 120px; }
  .cat h2 {
    font-size: 16px; margin: 0 0 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .cat h2 .cnt { color: var(--muted); font-size: 13px; font-weight: 400; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--accent); }
  .card a.name { color: var(--accent); font-weight: 600; font-size: 14px; text-decoration: none; word-break: break-all; }
  .card a.name:hover { text-decoration: underline; }
  .card .desc { font-size: 13px; color: var(--fg); opacity: .85; }
  .card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; align-items: center; margin-top: auto; }
  .badge { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  mark { background: var(--mark-bg); color: var(--mark-fg); border-radius: 2px; }
  a.gh { color: var(--muted); font-size: 12px; text-decoration: none; }
  a.gh:hover { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="title">⭐ GitHub Stars <small id="summary">読み込み中…</small></div>
  <div class="controls">
    <input id="search" type="search" placeholder="リポジトリ名・説明で検索…" autocomplete="off" />
    <select id="sort">
      <option value="starred_desc">starした順（新しい）</option>
      <option value="starred_asc">starした順（古い）</option>
      <option value="stars_desc">★が多い順</option>
      <option value="name_asc">名前順</option>
    </select>
    <select id="period">
      <option value="">全期間</option>
      <option value="30" selected>直近1ヶ月</option>
      <option value="90">直近3ヶ月</option>
      <option value="180">直近6ヶ月</option>
      <option value="365">直近1年</option>
    </select>
    <label class="checkbox" title="ONにすると、現在日ではなく一番最近starした日を起点に期間を数えます（しばらくstarしていなくても最新分が表示されます）">
      <input type="checkbox" id="fromLatest" checked /> 最新スターから換算
    </label>
    <button id="view" class="theme-toggle" title="表示切替">📋 一覧</button>
    <button id="theme" class="theme-toggle" title="テーマ切替">🌙 ダーク</button>
  </div>
</header>
<div class="chips" id="chips"></div>
<main id="main"><div class="empty">読み込み中…</div></main>

<script>
let DATA = null;
let activeCat = "";
let viewMode = "category"; // "category" | "flat"
let maxStarredMs = 0; // データ内の最新star日。期間フィルタの基準にする

const $ = (s) => document.querySelector(s);
const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function highlight(text, q) {
  const t = esc(text);
  if (!q) return t;
  try {
    const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
    return t.replace(re, "<mark>$1</mark>");
  } catch { return t; }
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
}

function sortRepos(repos) {
  const mode = $("#sort").value;
  const arr = repos.slice();
  switch (mode) {
    case "starred_asc": return arr.sort((a, b) => (a.starred_at || "").localeCompare(b.starred_at || ""));
    case "stars_desc":  return arr.sort((a, b) => b.stars - a.stars);
    case "name_asc":    return arr.sort((a, b) => a.name.localeCompare(b.name));
    case "starred_desc":
    default:            return arr.sort((a, b) => (b.starred_at || "").localeCompare(a.starred_at || ""));
  }
}

function matchQ(r, q) {
  return !q || r.name.toLowerCase().includes(q) || (r.desc || "").toLowerCase().includes(q);
}

function withinPeriod(r) {
  const days = parseInt($("#period").value, 10);
  if (!days) return true;
  if (!r.starred_at) return false;
  // チェックON: 一番最近starした日を起点に数える / OFF: 今日を起点
  const base = ($("#fromLatest").checked && maxStarredMs) ? maxStarredMs : Date.now();
  const diffDays = (base - new Date(r.starred_at).getTime()) / 86400000;
  return diffDays <= days;
}

function pass(r, q) {
  return matchQ(r, q) && withinPeriod(r);
}

function cardHtml(r, q, badge) {
  return `
    <div class="card">
      <a class="name" href="${esc(r.url)}" target="_blank" rel="noopener">${highlight(r.name, q)}</a>
      ${r.desc ? `<div class="desc">${highlight(r.desc, q)}</div>` : ""}
      <div class="meta">
        ${badge ? `<span class="badge">${badge.emoji} ${esc(badge.label)}</span>` : ""}
        <span>★ ${r.stars.toLocaleString()}</span>
        ${r.starred_at ? `<span title="starした日">📌 ${fmtDate(r.starred_at)}</span>` : ""}
      </div>
    </div>`;
}

function render() {
  const q = $("#search").value.trim().toLowerCase();
  const main = $("#main");
  main.innerHTML = "";

  if (viewMode === "flat") {
    // カテゴリ横断・単純にソート順で一覧表示
    const all = [];
    for (const cat of DATA.categories) {
      if (activeCat && cat.key !== activeCat) continue;
      for (const r of cat.repos) {
        if (pass(r, q)) all.push({ r, cat });
      }
    }
    const sorted = sortRepos(all.map((x) => x.r));
    const catOf = new Map(all.map((x) => [x.r, x.cat]));
    if (!sorted.length) { main.innerHTML = `<div class="empty">該当なし</div>`; return; }
    main.innerHTML = `<div class="grid">` +
      sorted.map((r) => cardHtml(r, q, catOf.get(r))).join("") + `</div>`;
    return;
  }

  // カテゴリ別表示
  let shown = 0;
  for (const cat of DATA.categories) {
    if (activeCat && cat.key !== activeCat) continue;
    const repos = sortRepos(cat.repos.filter((r) => pass(r, q)));
    if (!repos.length) continue;
    shown += repos.length;

    const sec = document.createElement("section");
    sec.className = "cat";
    sec.id = "cat-" + cat.key;
    sec.innerHTML =
      `<h2>${cat.emoji} ${esc(cat.label)} <span class="cnt">${repos.length}</span></h2>` +
      `<div class="grid">` +
      repos.map((r) => cardHtml(r, q, null)).join("") +
      `</div>`;
    main.appendChild(sec);
  }
  if (!shown) main.innerHTML = `<div class="empty">該当なし</div>`;
}

function buildChips() {
  const chips = $("#chips");
  const all = document.createElement("span");
  all.className = "chip active";
  all.textContent = `すべて (${DATA.total})`;
  all.onclick = () => { activeCat = ""; setActive(all); render(); };
  chips.appendChild(all);
  for (const cat of DATA.categories) {
    const c = document.createElement("span");
    c.className = "chip";
    c.textContent = `${cat.emoji} ${cat.label} (${cat.count})`;
    c.onclick = () => { activeCat = cat.key; setActive(c); render(); };
    chips.appendChild(c);
  }
}
function setActive(el) {
  document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
  el.classList.add("active");
}

function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === "dark") root.setAttribute("data-theme", "dark");
  else root.removeAttribute("data-theme");
  $("#theme").textContent = theme === "dark" ? "☀️ ライト" : "🌙 ダーク";
  localStorage.setItem("stars-theme", theme);
}
function initTheme() {
  let theme = localStorage.getItem("stars-theme");
  if (!theme) theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  applyTheme(theme);
  $("#theme").addEventListener("click", () => {
    applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });
}

async function init() {
  initTheme();
  try {
    const res = await fetch("stars.json?_=" + Date.now());
    DATA = await res.json();
  } catch (e) {
    $("#main").innerHTML = `<div class="empty">stars.json を読み込めませんでした。<br>build.sh を実行してください。</div>`;
    return;
  }
  $("#summary").textContent = `全${DATA.total}件 / ${DATA.categories.length}カテゴリ ・ 更新: ${DATA.updated_at}`;
  // 期間フィルタの基準にする「最新star日」を算出
  for (const cat of DATA.categories) {
    for (const r of cat.repos) {
      if (r.starred_at) maxStarredMs = Math.max(maxStarredMs, new Date(r.starred_at).getTime());
    }
  }
  buildChips();
  $("#search").addEventListener("input", render);
  $("#sort").addEventListener("change", render);
  $("#period").addEventListener("change", render);
  $("#fromLatest").addEventListener("change", render);
  $("#view").addEventListener("click", () => {
    viewMode = viewMode === "flat" ? "category" : "flat";
    $("#view").textContent = viewMode === "flat" ? "📑 カテゴリ別" : "📋 一覧";
    render();
  });
  render();
}
init();
</script>
</body>
</html>
